<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container">

    <h1>Login</h1>

    <form id="login-form">

      <input
        type="email"
        id="email"
        placeholder="Email"
        required
      >

      <input
        type="password"
        id="senha"
        placeholder="Senha"
        required
      >

      <button type="submit">
        Entrar
      </button>

    </form>

    <p id="mensagem"></p>

    <a href="register.html">
      Criar conta
    </a>

  </div>

  <script src="js/login.js"></script>

</body>
</html>
